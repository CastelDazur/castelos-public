  <text x="480" y="274" text-anchor="middle" fill="#b1bac4" font-size="10">Artifacts preserved, queryable</text>

  <text x="480" y="310" text-anchor="middle" fill="#8b949e" font-size="10.5">Governed execution engine</text>
  <text x="480" y="325" text-anchor="middle" fill="#8b949e" font-size="10.5">controlled, reversible</text>

